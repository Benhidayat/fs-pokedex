name: Playwright Tests
on:
  workflow_run: # this workflow will be triggered if ci pipeline is succeed
    workflows: ['Ci Pipeline']
    types: [completed]

jobs:
  test:
    if: ${{
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.event == 'push'
    }}
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: '20.20.2'
    - name: Check node and npm version
      run: |
        node -v
        npm -v
    - name: Install root dependencies
      run: npm ci
    - name: Install dependencies
      run: cd e2e-tests && npm ci
    - name: Install Playwright Browsers
      run: cd e2e-tests && npx playwright install --with-deps
    - name: Run Playwright tests
      run: cd e2e-tests && npm run test
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30